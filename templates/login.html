<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendLens — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-glow"></div>
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">SpendLens</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your account</p>

      <div id="error-msg" class="error-banner" style="display:none"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="your username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>

      <p class="auth-link">No account? <a href="/register">Create one</a></p>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    async function doLogin() {
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      btn.textContent = 'Signing in…'; btn.disabled = true; err.style.display = 'none';
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        })
      });
      const data = await res.json();
      if (res.ok) { window.location = '/'; }
      else {
        err.textContent = data.error; err.style.display = 'block';
        btn.textContent = 'Sign in'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
